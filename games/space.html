<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Blast aliens, grab power-ups."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/space"/>
  <meta property="og:title" content="Space Shooter — M.GAMES"/>
  <meta property="og:description" content="Blast aliens, grab power-ups."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/space"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <title>Space Shooter — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  </head>
<body class="game--space">
  <div class="g-noise" aria-hidden="true"></div>
  <header class="game-header"><div class="game-header__inner">
    <a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="game-title">SPACE</span>
    <div class="game-hud">
      <div class="hud-item"><span class="hud-item__label">Score</span><span class="hud-item__value" id="hudScore">0</span></div>
      <div class="hud-item"><span class="hud-item__label">Best</span><span class="hud-item__value" id="hudBest">0</span></div>
    </div>
  </div></header>
  <main class="game-main">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="480" height="640"></canvas>
      <div id="startScreen"><span class="start-emoji">🚀</span><p class="start-hint">← → move · Space shoot</p><button type="button" class="g-btn g-btn--primary" id="startBtn">Start</button></div>
    </div>
  </main>
  <div class="game-overlay" id="overlay"><div class="game-overlay__box">
    <span class="game-overlay__emoji">💥</span>
    <div class="game-overlay__title game-overlay__title--lose" id="overlayTitle">Game Over</div>
    <p class="game-overlay__sub" id="overlaySub"></p>
    <button type="button" class="g-btn g-btn--primary" id="againBtn">Play Again</button>
  </div></div>
  <script src="space.js"></script><script src="game-ui.js"></script>
</body>
</html>
