<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Slide and merge tiles to 2048."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/2048"/>
  <meta property="og:title" content="2048 — M.GAMES"/>
  <meta property="og:description" content="Slide and merge tiles to 2048."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/2048"/>
  <title>2048 — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  </head>
<body class="game--2048">
  <div class="g-noise" aria-hidden="true"></div>
  <header class="game-header"><div class="game-header__inner">
    <a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="game-title">2048</span>
    <div class="game-hud">
      <div class="hud-item"><span class="hud-item__label">Score</span><span class="hud-item__value" id="hudScore">0</span></div>
      <div class="hud-item"><span class="hud-item__label">Best</span><span class="hud-item__value" id="hudBest">0</span></div>
    </div>
  </div></header>
  <main class="game-main">
    <div class="board" id="board"></div>
    <p class="msg">Arrow keys or swipe to merge</p>
    <button class="g-btn g-btn--outline" id="newBtn" style="margin-top:1rem">New Game</button>
  </main>
  <div class="game-overlay" id="overlay"><div class="game-overlay__box">
    <span class="game-overlay__emoji">🎉</span>
    <div class="game-overlay__title game-overlay__title--win" id="overlayTitle">You Win!</div>
    <button class="g-btn g-btn--primary" id="againBtn">Play Again</button>
  </div></div>
  <script src="2048.js"></script><script src="game-ui.js"></script>
</body>
</html>
