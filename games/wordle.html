<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content=""/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="/games/wordle"/>
  <meta property="og:title" content="Wordle — M.GAMES"/>
  <meta property="og:description" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="/games/wordle"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ── Board ─────────────────────────────────────────────── */
    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
      margin: 1.5rem auto 1rem;
      width: fit-content;
    }

    .tile-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .tile {
      width: 58px;
      height: 58px;
      border: 2px solid var(--g-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--g-mono);
      font-size: 1.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--g-text);
      background: transparent;
      transition: border-color 0.1s;
      user-select: none;
      position: relative;
      transform-style: preserve-3d;
    }

    .tile[data-state="filled"] {
      border-color: var(--g-muted);
    }

    .tile[data-state="correct"] {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }

    .tile[data-state="present"] {
      background: #f59e0b;
      border-color: #f59e0b;
      color: #fff;
    }

    .tile[data-state="absent"] {
      background: var(--g-surface);
      border-color: var(--g-surface);
      color: var(--g-muted);
    }

    /* ── Tile flip animation ───────────────────────────────── */
    @keyframes tileReveal {
      0%   { transform: rotateX(0deg); }
      49%  { transform: rotateX(90deg); }
      50%  { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .tile.revealing {
      animation: tileReveal 0.5s ease-in-out forwards;
    }

    /* ── Pop animation when typing ────────────────────────── */
    @keyframes tilePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .tile.pop {
      animation: tilePop 0.1s ease-in-out;
    }

    /* ── Shake animation ───────────────────────────────────── */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      30%  { transform: translateX(6px); }
      45%  { transform: translateX(-5px); }
      60%  { transform: translateX(5px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    .tile-row.shake {
      animation: shake 0.5s ease-in-out;
    }

    /* ── Message ───────────────────────────────────────────── */
    #message {
      font-family: var(--g-mono);
      font-size: 0.85rem;
      color: var(--g-text);
      background: var(--g-card);
      border: 1px solid var(--g-border-hi);
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      min-height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #message.show {
      opacity: 1;
    }

    /* ── Keyboard ──────────────────────────────────────────── */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 0.5rem;
      width: 100%;
      max-width: 500px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      height: 58px;
      min-width: 38px;
      padding: 0 6px;
      border-radius: 6px;
      border: 1px solid var(--g-border);
      background: var(--g-surface);
      color: var(--g-text);
      font-family: var(--g-mono);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
      flex: 0 0 auto;
    }

    .key:hover {
      border-color: var(--g-border-hi);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
    }

    .key.wide {
      min-width: 60px;
      font-size: 0.72rem;
    }

    .key[data-state="correct"] {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }

    .key[data-state="present"] {
      background: #f59e0b;
      border-color: #f59e0b;
      color: #fff;
    }

    .key[data-state="absent"] {
      background: var(--g-card);
      border-color: var(--g-card);
      color: var(--g-dark);
    }

    /* ── Overlay word reveal ───────────────────────────────── */
    #overlayWord {
      font-family: var(--g-mono);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--g-grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 480px) {
      .tile { width: 48px; height: 48px; font-size: 1.4rem; }
      .key  { height: 50px; min-width: 30px; font-size: 0.75rem; }
      .key.wide { min-width: 48px; font-size: 0.65rem; }
      #board { gap: 5px; }
      .tile-row { gap: 5px; }
      .key-row  { gap: 4px; }
    }

    /* ── Extra-small phones (≤ 340px) ──────────────────────── */
    @media (max-width: 340px) {
      .tile { width: 42px; height: 42px; font-size: 1.2rem; }
      #board { gap: 4px; }
      .tile-row { gap: 4px; }
      .key  { height: 44px; min-width: 25px; font-size: 0.65rem; padding: 0 2px; }
      .key.wide { min-width: 40px; font-size: 0.58rem; }
      .key-row  { gap: 3px; }
      #keyboard { gap: 5px; }
    }
  </style>
</head>
<body>
  <div class="g-noise" aria-hidden="true"></div>

  <!-- Header -->
  <header class="game-header">
    <div class="game-header__inner">
      <a href="index.html" class="game-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </a>
      <span class="game-title">WORDLE</span>
      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-item__label">Score</span>
          <span class="hud-item__value" id="hudScore">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-item__label">Streak</span>
          <span class="hud-item__value" id="hudStreak">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="game-main">
    <div id="board" role="grid" aria-label="Wordle board"></div>
    <div id="message" role="status" aria-live="polite"></div>
    <div id="keyboard" role="group" aria-label="On-screen keyboard"></div>
  </main>

  <!-- Win/Lose Overlay -->
  <div class="game-overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <div class="game-overlay__box">
      <span class="game-overlay__emoji" id="overlayEmoji">🎉</span>
      <div class="game-overlay__title" id="overlayTitle">You got it!</div>
      <div class="game-overlay__sub" id="overlaySub">The word was</div>
      <span id="overlayWord"></span>
      <span class="game-overlay__score" id="overlayScore"></span>
      <div class="game-overlay__actions">
        <button class="g-btn g-btn--primary" id="playAgainBtn">Play Again</button>
        <a href="index.html" class="g-btn g-btn--outline">← Back to Games</a>
      </div>
    </div>
  </div>

  <script src="wordle.js"></script>
<script src="game-ui.js"></script>
</body>
</html>
