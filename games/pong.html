<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Classic paddle vs AI to 7 points."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/pong"/>
  <meta property="og:title" content="Pong — M.GAMES"/>
  <meta property="og:description" content="Classic paddle vs AI to 7 points."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/pong"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <title>Pong — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  </head>
<body class="game--pong">
  <div class="g-noise" aria-hidden="true"></div>
  <header class="game-header"><div class="game-header__inner">
    <a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="game-title">PONG</span>
    <div class="game-hud"><div class="hud-item"><span class="hud-item__label">Score</span><span class="hud-item__value" id="hudScore">0</span></div>
    <div class="hud-item"><span class="hud-item__label">Best</span><span class="hud-item__value" id="hudBest">0</span></div></div>
  </div></header>
  <main class="game-main">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="640" height="400"></canvas>
      <div id="startScreen"><span class="start-emoji">🏓</span><p class="start-hint">W/S or ↑↓ — first to 7 wins</p><button type="button" class="g-btn g-btn--primary" id="startBtn">Start</button></div>
    </div>
  </main>
  <div class="game-overlay" id="overlay"><div class="game-overlay__box">
    <span class="game-overlay__emoji" id="overlayEmoji">🏆</span>
    <div class="game-overlay__title" id="overlayTitle">Game Over</div>
    <p class="game-overlay__sub" id="overlaySub"></p>
    <button type="button" class="g-btn g-btn--primary" id="againBtn">Play Again</button>
  </div></div>
  <script src="pong.js"></script><script src="game-ui.js"></script>
</body>
</html>
