<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <title>Tic-Tac-Toe — M.Games</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .game-main{gap:1rem}
    #startScreen{position:absolute;inset:0;z-index:5;background:rgba(5,5,16,.88);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;border-radius:12px}
    #startScreen.hidden{opacity:0;pointer-events:none;visibility:hidden}
    .start-emoji{font-size:3rem}.start-title{font-family:var(--g-mono);font-size:1.35rem;font-weight:700;background:var(--g-grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .start-hint{font-family:var(--g-mono);font-size:.8rem;color:var(--g-muted);text-align:center;padding:0 1rem;max-width:28rem;line-height:1.6}
    .canvas-wrap{position:relative;width:min(100%,640px);border-radius:12px;overflow:hidden;border:1px solid var(--g-border)}
    .canvas-wrap canvas{display:block;width:100%;touch-action:none}
    #grid{display:grid;grid-template-columns:repeat(3,90px);gap:8px}#grid button{width:90px;height:90px;font-size:2rem;border-radius:12px;border:1px solid var(--g-border);background:var(--g-card);color:var(--g-text);cursor:pointer}
  </style>
</head>
<body>
  <div class="g-noise" aria-hidden="true"></div>
  <header class="game-header"><div class="game-header__inner">
    <a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="game-title">TIC-TAC-TOE</span>
    <div class="game-hud"><div class="hud-item"><span class="hud-item__label">You</span><span class="hud-item__value" id="hudYou">0</span></div>
        <div class="hud-item"><span class="hud-item__label">AI</span><span class="hud-item__value" id="hudAI">0</span></div></div>
  </div></header>
  <main class="game-main"><div id="startScreen"><span class="start-emoji">⭕</span><span class="start-title">TIC-TAC-TOE</span><p class="start-hint">You are X. Beat the minimax AI.</p><button class="g-btn g-btn--primary" id="startBtn">Start</button></div><div id="grid" hidden></div></main>
  <div class="game-overlay" id="overlay"><div class="game-overlay__box">
    <span class="game-overlay__emoji" id="overlayEmoji">🤖</span>
    <div class="game-overlay__title" id="overlayTitle">Game Over</div>
    <p class="game-overlay__sub" id="overlaySub"></p>
    <div class="game-overlay__actions">
      <button type="button" class="g-btn g-btn--primary" id="againBtn">Play Again</button>
      <a href="index.html" class="g-btn g-btn--outline">← Back to Games</a>
    </div>
  </div></div>
  <script src="tictactoe.js"></script>
  <script src="game-ui.js"></script>
</body></html>
