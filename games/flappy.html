<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Dodge pipes, beat your high score."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/flappy"/>
  <meta property="og:title" content="Flappy Bird — M.GAMES"/>
  <meta property="og:description" content="Dodge pipes, beat your high score."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/flappy"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  </head>
<body class="game--flappy">
  <div class="g-noise" aria-hidden="true"></div>

  <header class="game-header">
    <div class="game-header__inner">
      <a href="index.html" class="game-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </a>

      <span class="game-title">FLAPPY BIRD</span>

      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-item__label">Score</span>
          <span class="hud-item__value" id="hudScore">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-item__label">Best</span>
          <span class="hud-item__value" id="hudBest">0</span>
        </div>
      </div>
    </div>
  </header>

  <main class="game-main">
    <div class="canvas-wrapper">
      <canvas id="flappyCanvas" width="360" height="600" aria-label="Flappy Bird game canvas"></canvas>
    </div>
    <div class="flappy-hint">
      <span class="ctrl-key game-controls__key--kb">Space</span>
      <span class="game-controls__key--kb"> or </span>
      <span class="game-controls__key--touch" style="display:none">👆 </span>
      Tap to flap
    </div>
  </main>

  <script src="flappy.js"></script>
<script src="game-ui.js"></script>
</body>
</html>
