<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Seven tetrominoes, ghost piece, levels."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/tetris"/>
  <meta property="og:title" content="Tetris — M.GAMES"/>
  <meta property="og:description" content="Seven tetrominoes, ghost piece, levels."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/tetris"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  </head>
<body class="game--tetris">
  <div class="g-noise" aria-hidden="true"></div>

  <header class="game-header">
    <div class="game-header__inner">
      <a href="index.html" class="game-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </a>

      <span class="game-title">TETRIS</span>

      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-item__label">Score</span>
          <span class="hud-item__value" id="hudScore">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-item__label">Lines</span>
          <span class="hud-item__value" id="hudLines">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-item__label">Level</span>
          <span class="hud-item__value" id="hudLevel">1</span>
        </div>
      </div>
    </div>
  </header>

  <main class="game-main">
    <div class="canvas-wrap">
      <canvas id="tetrisCanvas" width="280" height="560"></canvas>
      <span class="pause-badge" id="pauseBadge">PAUSED</span>
    </div>

    <aside class="side-panel">
      <div class="side-card">
        <div class="side-card__label">Next</div>
        <canvas id="nextCanvas" width="120" height="120"></canvas>
      </div>

      <div class="side-card">
        <div class="side-card__label">Best</div>
        <div class="high-score-val" id="highScoreVal">0</div>
      </div>

      <div class="side-card controls-card">
        <div class="side-card__label">Controls</div>
        <div class="controls-list">
          <div class="ctrl-row">
            <span class="ctrl-key">← →</span>
            <span>Move</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-key">↑ / Z</span>
            <span>Rotate</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-key">↓</span>
            <span>Soft drop</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-key">Space</span>
            <span>Hard drop</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-key">P</span>
            <span>Pause</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile on-screen controls -->
    <div class="mobile-controls" id="mobileControls" aria-label="Game controls">
      <button class="mob-btn" id="mobLeft"   aria-label="Move left">◀</button>
      <button class="mob-btn" id="mobDown"   aria-label="Soft drop">▼</button>
      <button class="mob-btn" id="mobRotate" aria-label="Rotate">↻</button>
      <button class="mob-btn" id="mobRight"  aria-label="Move right">▶</button>
      <button class="mob-btn mob-btn--drop" id="mobDrop" aria-label="Hard drop">⬇</button>
    </div>
    <p class="swipe-hint-mobile">Swipe on board · Tap = Rotate · Swipe ↓ = Drop</p>
  </main>

  <!-- Game Over Overlay -->
  <div class="game-overlay" id="gameOverlay" role="dialog" aria-modal="true" aria-label="Game Over">
    <div class="game-overlay__box">
      <span class="game-overlay__emoji">💥</span>
      <h2 class="game-overlay__title game-overlay__title--lose">GAME OVER</h2>
      <p class="game-overlay__sub">The blocks have won this round.</p>
      <span class="game-overlay__score" id="overlayScore">Score: 0</span>
      <div class="game-overlay__actions">
        <button class="g-btn g-btn--primary" id="restartBtn">Play Again</button>
        <a href="index.html" class="g-btn g-btn--outline">Back to Games</a>
      </div>
    </div>
  </div>

  <script src="tetris.js"></script>
<script src="game-ui.js"></script>
</body>
</html>
