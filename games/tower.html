<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta name="author" content="Mohammed Al-Omari"/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://mohammedalomari.dev/games/tower"/>

<link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
</head>
<body class="game--tower">
<div class="g-noise" aria-hidden="true"></div>
<header class="game-header"><div class="game-header__inner">
<a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
<span class="game-title">BUILDING TOWER</span>
<div class="game-hud"><div class="hud-item"><span class="hud-item__label">Floors</span><span class="hud-item__value" id="hudFloors">0</span></div><div class="hud-item"><span class="hud-item__label">Best</span><span class="hud-item__value" id="hudBest">0</span></div></div>
</div></header>
<main class="game-main"><div class="canvas-wrap" style="width:min(100%,400px)">
<canvas id="gameCanvas" width="400" height="560"></canvas>
<div id="startScreen"><span class="start-emoji">🏗️</span><p class="start-hint">Click or Enter to drop the swinging block</p>
<button type="button" class="g-btn g-btn--primary" id="startBtn">Start</button></div></div>
<p class="start-hint" style="margin-top:.5rem">Space — restart after game over</p></main>
<div class="game-overlay" id="overlay"><div class="game-overlay__box">
<span class="game-overlay__emoji" id="overlayEmoji">🏗️</span>
<div class="game-overlay__title" id="overlayTitle">Game Over</div>
<p class="game-overlay__sub" id="overlaySub"></p>
<button type="button" class="g-btn g-btn--primary" id="againBtn">Play Again</button>
</div></div>
<script src="tower-game.js"></script><script src="game-ui.js"></script>
</body></html>
