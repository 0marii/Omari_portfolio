<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Flip and match all pairs in fewest moves."/>
  <meta name="author" content="Mohammed Al-Omari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://mohammedalomari.dev/games/memory"/>
  <meta property="og:title" content="Memory Match — M.GAMES"/>
  <meta property="og:description" content="Flip and match all pairs in fewest moves."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mohammedalomari.dev/games/memory"/>
  <link rel="icon" type="image/png" href="/Images/logo.png"/>
  <title>Memory Match — M.Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game-skins.css" />
  </head>
<body class="game--memory">
  <div class="g-noise" aria-hidden="true"></div>
  <header class="game-header"><div class="game-header__inner">
    <a href="index.html" class="game-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="game-title">MEMORY</span>
    <div class="game-hud">
      <div class="hud-item"><span class="hud-item__label">Moves</span><span class="hud-item__value" id="hudMoves">0</span></div>
      <div class="hud-item"><span class="hud-item__label">Best</span><span class="hud-item__value" id="hudBest">—</span></div>
    </div>
  </div></header>
  <main class="game-main">
    <div id="startScreen">
      <span class="start-emoji">🧠</span>
      <p class="start-hint">Match all pairs. Pick a difficulty.</p>
      <div class="diff-row">
        <button type="button" class="diff-btn active" data-cols="4" data-rows="4">Easy 4×4</button>
        <button type="button" class="diff-btn" data-cols="5" data-rows="4">Medium 5×4</button>
        <button type="button" class="diff-btn" data-cols="6" data-rows="4">Hard 6×4</button>
      </div>
      <button type="button" class="g-btn g-btn--primary" id="startBtn">Start</button>
    </div>
    <div id="board" hidden></div>
  </main>
  <div class="game-overlay" id="overlay"><div class="game-overlay__box">
    <span class="game-overlay__emoji">🎉</span>
    <div class="game-overlay__title game-overlay__title--win" id="overlayTitle">You Win!</div>
    <p class="game-overlay__sub" id="overlaySub"></p>
    <button type="button" class="g-btn g-btn--primary" id="againBtn">Play Again</button>
  </div></div>
  <script src="memory.js"></script><script src="game-ui.js"></script>
</body>
</html>
