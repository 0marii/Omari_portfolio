name: Games Tests

on:
  push:
    paths:
      - 'games/**'
      - 'index.html'
      - 'script.js'
      - 'style.css'
      - 'sw.js'
      - 'sitemap.xml'
      - 'e2e/**'
      - 'package.json'
      - 'vitest.config.js'
      - 'playwright.config.js'
  pull_request:
    paths:
      - 'games/**'
      - 'index.html'
      - 'script.js'
      - 'e2e/**'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:e2e
